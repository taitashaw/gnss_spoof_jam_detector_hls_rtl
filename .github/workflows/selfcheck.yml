# ============================================================================
# selfcheck.yml -- license-free verification on every push / PR
# Author: John Bagshaw   License: MIT (c) 2026 John Bagshaw
#
# Runs `make selfcheck` (vectors -> C golden sim -> check -> summary) which needs
# only python3 + numpy + g++. No Xilinx tool (Vitis HLS / Vivado / XSim) runs in
# CI -- those require licenses and are intentionally NOT invoked here.
# ============================================================================
name: selfcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selfcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (numpy, matplotlib, g++)
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++ make

      - name: make selfcheck (no Xilinx tools)
        run: make selfcheck
